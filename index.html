<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather 🌡️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 550px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '🇮🇳';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 10px;
            font-size: 2.8em;
            font-weight: 300;
        }

        .tagline {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            position: relative;
        }

        #cityInput {
            width: 65%;
            padding: 18px 25px;
            border: 2px solid #e1f5fe;
            border-radius: 50px 0 0 50px;
            font-size: 16px;
            outline: none;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        #cityInput:focus {
            border-color: #4ecdc4;
            background: white;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        #searchBtn {
            padding: 18px 35px;
            border: none;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .indian-cities {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .city-btn {
            padding: 8px 16px;
            background: #e1f5fe;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: #0277bd;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .city-btn:hover {
            background: #4ecdc4;
            color: white;
            transform: scale(1.05);
        }

        .weather-info {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city-name {
            font-size: 2.4em;
            color: #2d3436;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .temperature {
            font-size: 4.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .weather-condition {
            font-size: 1.6em;
            color: #636e72;
            margin-bottom: 25px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .weather-icon {
            font-size: 6em;
            margin-bottom: 20px;
        }

        .feels-like {
            background: rgba(78, 205, 196, 0.2);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.1em;
            color: #2d3436;
        }

        .error {
            color: #e17055;
            font-size: 1.2em;
            margin-top: 20px;
            display: none;
            background: rgba(225, 112, 85, 0.1);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #e17055;
        }

        .loading {
            font-size: 1.3em;
            color: #4ecdc4;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 2.2em;
            }
            
            #cityInput {
                width: 55%;
                padding: 15px 20px;
            }
            
            .temperature {
                font-size: 3.5em;
            }
            
            .indian-cities {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ India Weather</h1>
        <p class="tagline">Get current weather for any Indian city</p>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter Indian city (Mumbai, Delhi, Bangalore...)" />
            <button id="searchBtn">🔍 Search</button>
        </div>

        <div class="indian-cities">
            <button class="city-btn" onclick="quickSearch('Delhi')">Delhi</button>
            <button class="city-btn" onclick="quickSearch('Mumbai')">Mumbai</button>
            <button class="city-btn" onclick="quickSearch('Bangalore')">Bangalore</button>
            <button class="city-btn" onclick="quickSearch('Chennai')">Chennai</button>
            <button class="city-btn" onclick="quickSearch('Kolkata')">Kolkata</button>
            <button class="city-btn" onclick="quickSearch('Hyderabad')">Hyderabad</button>
        </div>
        
        <div class="loading" id="loading">🌤️ Fetching weather for Delhi...</div>
        <div class="error" id="error">❌ City not found! Try Delhi, Mumbai, Bangalore, etc.</div>
        
        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName"></div>
            <div class="weather-icon" id="weatherIcon">🌤️</div>
            <div class="temperature" id="temperature"></div>
            <div class="weather-condition" id="weatherCondition"></div>
            <div class="feels-like" id="feelsLike"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'YOUR_OPENWEATHERMAP_API_KEY'; // Get FREE from openweathermap.org
        const API_URL = 'https://api.openweathermap.org/data/2.5/weather';

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const weatherInfo = document.getElementById('weatherInfo');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const cityName = document.getElementById('cityName');
        const temperature = document.getElementById('temperature');
        const weatherCondition = document.getElementById('weatherCondition');
        const weatherIcon = document.getElementById('weatherIcon');
        const feelsLike = document.getElementById('feelsLike');

        // Indian cities that work perfectly with OpenWeatherMap
        const indianCities = [
            'Delhi', 'Mumbai', 'Bangalore', 'Chennai', 'Kolkata', 'Hyderabad', 
            'Pune', 'Ahmedabad', 'Jaipur', 'Lucknow', 'Kanpur', 'Nagpur',
            'Indore', 'Thane', 'Bhopal', 'Visakhapatnam', 'Pimpri', 'Patna',
            'Vadodara', 'Ghaziabad', 'Ludhiana', 'Nashik', 'Faridabad', 'Meerut',
            'Rajkot', 'Kalyan', 'Vasai-Virar', 'Varanasi', 'Srinagar', 'Aurangabad',
            'Dhanbad', 'Amritsar', 'Navi Mumbai', 'Allahabad', 'Haora', 'Ranchi',
            'Howrah', 'Coimbatore', 'Jabalpur', 'Gwalior', 'Vijayawada', 'Jodhpur',
            'Madurai', 'Raipur', 'Kota', 'Chandigarh', 'Guwahati', 'Solapur'
        ];

        async function getWeather(city) {
            try {
                loading.textContent = `🌤️ Fetching weather for ${city}...`;
                loading.style.display = 'block';
                weatherInfo.style.display = 'none';
                error.style.display = 'none';

                const response = await fetch(`${API_URL}?q=${city},IN&appid=${API_KEY}&units=metric`);
                
                if (!response.ok) {
                    throw new Error('City not found');
                }
                
                const data = await response.json();
                displayWeather(data, city);
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                weatherInfo.style.display = 'none';
            }
        }

        function displayWeather(data, searchedCity) {
            loading.style.display = 'none';
            weatherInfo.style.display = 'block';

            cityName.textContent = data.name;
            temperature.textContent = Math.round(data.main.temp) + '°C';
            weatherCondition.textContent = data.weather[0].description;
            feelsLike.innerHTML = `Feels like: ${Math.round(data.main.feels_like)}°C | Humidity: ${data.main.humidity}%`;

            // Enhanced weather icons for Indian weather
            const weatherMain = data.weather[0].main.toLowerCase();
            if (weatherMain.includes('clear')) weatherIcon.textContent = '☀️';
            else if (weatherMain.includes('cloud')) weatherIcon.textContent = '☁️';
            else if (weatherMain.includes('rain')) weatherIcon.textContent = '🌧️';
            else if (weatherMain.includes('thunderstorm')) weatherIcon.textContent = '⛈️';
            else if (weatherMain.includes('drizzle')) weatherIcon.textContent = '🌦️';
            else if (weatherMain.includes('mist') || weatherMain.includes('fog') || weatherMain.includes('haze')) weatherIcon.textContent = '🌫️';
            else if (weatherMain.includes('snow')) weatherIcon.textContent = '❄️';
            else weatherIcon.textContent = '🌤️';
        }

        // Quick search for Indian cities
        function quickSearch(city) {
            cityInput.value = city;
            getWeather(city);
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                getWeather(city);
            }
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) {
                    getWeather(city);
                }
            }
        });

        // Load Delhi weather by default (Most reliable)
        window.addEventListener('load', () => {
            quickSearch('Delhi');
        });
    </script>
</body>
</html>
